services:
  server:
    build: .
    container_name: connect-seoul-server
    ports:
      - "3000:3000"
    volumes:
      # DB와 로그는 컨테이너 밖에 보존
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
